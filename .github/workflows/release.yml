name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to build and release (e.g. v2.5.1)'
        required: true

jobs:
  release:
    name: Build & publish release
    runs-on: ubuntu-latest

    steps:
      - name: Resolve tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            RAW="${{ github.event.inputs.tag }}"
            # Normalize: ensure tag starts with 'v'
            [[ "$RAW" == v* ]] && TAG="$RAW" || TAG="v$RAW"
          else
            TAG="${GITHUB_REF#refs/tags/}"
          fi
          echo "name=$TAG" >> "$GITHUB_OUTPUT"

      - name: Checkout tag
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.tag.outputs.name }}

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Build debug APK
        run: ./gradlew :sample-app:assemblePublicSdkDebug

      - name: Rename APK
        run: |
          mv sample-app/build/outputs/apk/publicSdk/debug/sample-app-public-sdk-debug.apk \
             openweb-sample-app-${{ steps.tag.outputs.name }}-debug.apk

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.name }}
          name: ${{ steps.tag.outputs.name }}
          draft: false
          prerelease: false
          files: openweb-sample-app-${{ steps.tag.outputs.name }}-debug.apk
          generate_release_notes: false
